server:
  port: 8010

jwt:
  secret: ${JWT_SECRET:your_jwt_secret_here}
  expiration: 86400000

spring:
  application:
    name: Backend
  datasource:
    url: jdbc:mysql://localhost:3306/forestverse?useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_password_here}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.example.backend.entity
  configuration:
    map-underscore-to-camel-case: true
